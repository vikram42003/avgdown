reviews:
  path_filters:
    - "**/*"
    - "!**/.agent/**"
    - "!**/.agents/**"
    - "!**/skills-lock.json"
  tone_instructions: "Act as a highly experienced, friendly senior developer reviewing my code. Keep the tone relaxed and conversational, but be incredibly thorough with your technical feedback. Focus on looking out for bugs, anti-pattern, or security risk. Alongside the fix, always explain the why in plain English so I can learn the underlying concepts and best practices."
  
  path_instructions:
    - path: "**/*.{js,ts,jsx,tsx}"
      instructions: "When reviewing frontend or API logic, focus on modern React and Next.js best practices. If there's a cleaner or more optimized way to write a component or function, show me the code and explain why it's the industry standard."
      
    - path: "**/*.{py,tf,json}"
      instructions: "For backend, infrastructure, or cloud configurations (like AWS), keep an eye out for security vulnerabilities or inefficient setups. Provide the fix and explain the security or performance concepts behind it."